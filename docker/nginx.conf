server {
    listen 80;
    server_name _;

    # Frontend (React SPA)
    root /usr/share/nginx/html;
    index index.html;

    # Gzip siqish
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # API proxy → Backend
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Fayl yuklash chegarasi
        client_max_body_size 20M;

        # Timeout
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
    }

    # Swagger UI proxy
    location /swagger-ui/ {
        proxy_pass http://backend:8080/swagger-ui/;
        proxy_set_header Host $host;
    }
    location /v3/api-docs {
        proxy_pass http://backend:8080/v3/api-docs;
        proxy_set_header Host $host;
    }
    location /api-docs {
        proxy_pass http://backend:8080/api-docs;
        proxy_set_header Host $host;
    }

    # Yuklangan fayllar proxy
    location /uploads/ {
        proxy_pass http://backend:8080/uploads/;
        proxy_set_header Host $host;
    }

    # React Router — barcha yo'nalishlar index.html ga
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Statik fayllar keshi
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
