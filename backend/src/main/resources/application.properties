# ===========================
# APPLICATION SETTINGS
# ===========================
spring.application.name=equipment-api
server.port=8080

# ===========================
# DATABASE (PostgreSQL)
# ===========================
spring.datasource.url=jdbc:postgresql://localhost:5432/equipment_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ===========================
# JPA / HIBERNATE
# ===========================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ===========================
# FLYWAY (Database Migration)
# ===========================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ===========================
# JWT SETTINGS
# ===========================
app.jwt.secret=YourSuperSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong2026
app.jwt.access-token-expiration=1800000
app.jwt.refresh-token-expiration=604800000

# ===========================
# FILE UPLOAD
# ===========================
app.upload.dir=./uploads
app.upload.max-file-size=10485760
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ===========================
# CORS
# ===========================
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# ===========================
# MAIL (SMTP)
# ===========================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===========================
# SWAGGER / OPENAPI
# ===========================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ===========================
# LOGGING
# ===========================
logging.level.root=INFO
logging.level.uz.boshliq.equipment=DEBUG
logging.level.org.springframework.security=INFO
